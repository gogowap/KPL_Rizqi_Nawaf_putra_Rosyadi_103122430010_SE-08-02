<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengkonversi Gaya Teks</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Pengkonversi Gaya Teks</h1>
        <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>
        
        <label for="editor-kecil">Masukkan teks:</label>
        <textarea id="editor-kecil" placeholder="Kata-kata..."></textarea>
        
        <div class="info">
            Huruf: <span id="hf">0</span>, 
            huruf besar: <span id="hb">0</span>, 
            huruf kecil: <span id="hk">0</span>
        </div>

        <div class="grup-tg">
            <button id="btn-besar">Besarkan</button>
            <button id="btn-kecil">Kecilkan</button>
        </div>

        <div class="grup-tg">
            <button id="tombol-terang">Mode Terang</button>
            <button id="tombol-gelap">Mode Gelap</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
